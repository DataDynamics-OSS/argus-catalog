name: ✨ 기능 제안
description: 새로운 기능이나 개선 아이디어를 제안합니다
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        제안해 주셔서 감사합니다. 어떤 문제를 해결하려는지 배경을 함께 적어 주시면
        검토에 큰 도움이 됩니다.
  - type: textarea
    id: problem
    attributes:
      label: 해결하려는 문제 / 동기
      description: 어떤 불편이나 한계가 있나요?
      placeholder: "...할 때 ...이 불편합니다."
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: 제안하는 기능
      description: 원하는 동작/기능을 설명해 주세요.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 고려한 대안
      description: 검토했던 다른 방법이 있다면 적어 주세요.
    validations:
      required: false
  - type: dropdown
    id: component
    attributes:
      label: 관련 컴포넌트
      options:
        - backend
        - frontend
        - sdk
        - agent
        - quality
        - tests
        - 전반 / 모름
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: 추가 맥락
      description: 사용 사례, 참고 자료, 스크린샷 등
    validations:
      required: false
