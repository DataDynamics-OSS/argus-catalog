# Trino 통합 테스트 — Trino + Hive Metastore + MinIO.
#
# 구성:
#   - hms       : apache/hive:4.0.0 standalone metastore (derby 내장)
#   - minio     : S3 호환 스토리지 (warehouse)
#   - minio-init: warehouse 버킷 생성 init container
#   - trino     : Trino coordinator, hive connector + S3FileIO
#
# Trino 의 catalog properties 는 ``etc/catalog/hive.properties`` 를 그대로
# /etc/trino/catalog/ 에 마운트해 등록.

services:
  hms:
    image: apache/hive:4.0.0
    container_name: argus-test-trino-hms
    environment:
      SERVICE_NAME: metastore
      # s3a:// warehouse 위치 생성을 위해 hadoop-aws(tools/lib)를 클래스패스에 포함.
      HADOOP_OPTIONAL_TOOLS: hadoop-aws
    volumes:
      - ./etc/hadoop/core-site.xml:/opt/hadoop/etc/hadoop/core-site.xml:ro
    healthcheck:
      # apache/hive 이미지엔 ss/netstat/nc 가 없고 HMS 는 IPv6 로 listen 하므로
      # bash 의 /dev/tcp 로 9083 연결 가능 여부를 확인한다(bash 는 이미지에 존재).
      test: ["CMD-SHELL", "timeout 2 bash -c 'exec 3<>/dev/tcp/127.0.0.1/9083' || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 60
      start_period: 60s

  minio:
    image: minio/minio:latest
    container_name: argus-test-trino-minio
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live || exit 1"]
      interval: 2s
      timeout: 3s
      retries: 30

  minio-init:
    image: minio/mc:latest
    container_name: argus-test-trino-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint:
      - /bin/sh
      - -c
      - |
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb --ignore-existing local/warehouse
    restart: "no"

  trino:
    image: trinodb/trino:latest
    container_name: argus-test-trino
    depends_on:
      hms:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    ports:
      - "18080:8080"
    volumes:
      - ./etc/catalog/hive.properties:/etc/trino/catalog/hive.properties:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/v1/info | tr -d ' ' | grep -q '\"starting\":false' || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 60
      start_period: 30s
