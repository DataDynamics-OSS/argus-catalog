# Argus Catalog — 로컬 개발용 인프라 스택 (MinIO + Temporal + Keycloak).
#
# 백엔드/프론트엔드는 로컬에서 직접 실행하고, DB는 mac 로컬 postgres를 쓰는
# 시나리오를 위한 구성. backend/packaging/config/config.properties 의
# 기본값(localhost 기준)과 포트가 일치한다.
#
# 기동:
#   docker compose -f deploy/docker-compose.infra.yml up -d
#
# 엔드포인트:
#   - MinIO S3 API  : http://localhost:9000
#   - MinIO Console : http://localhost:9001  (minioadmin / minioadmin)
#   - Temporal gRPC : localhost:7233
#   - Temporal UI   : http://localhost:8233
#   - Keycloak      : http://localhost:8180  (admin / admin)
#   - MariaDB(Sakila): localhost:3306  (sakila / sakila, db=sakila)
#     ※ 최초 기동 전 ./deploy/download-sakila.sh 실행 필요 (스키마+데이터 다운로드)
#
# Keycloak 은 deploy/config/keycloak/argus-realm.json 을 자동 import 하여
# realm(argus) · client(argus-client) · 롤(argus-admin/superuser/user)을 구성한다.
#
# 종료:
#   docker compose -f deploy/docker-compose.infra.yml down        # 컨테이너만
#   docker compose -f deploy/docker-compose.infra.yml down -v     # 볼륨까지 (데이터 삭제)

name: argus-catalog-infra

services:
  # ------------------------------------------------------------------- S3(MinIO)
  minio:
    image: minio/minio:latest
    container_name: argus-infra-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # 콘솔
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 12

  # ----------------------------------------------- model-artifacts 버킷 자동 생성
  minio-init:
    image: minio/mc:latest
    container_name: argus-infra-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/model-artifacts
      "

  # ----------------------------------------------------------- Temporal 메타 DB
  temporal-postgresql:
    image: postgres:16
    container_name: argus-infra-temporal-postgresql
    environment:
      POSTGRES_USER: temporal
      POSTGRES_PASSWORD: temporal
    volumes:
      - temporal-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U temporal"]
      interval: 5s
      timeout: 5s
      retries: 12

  # ---------------------------------------------------------------- Temporal 서버
  temporal:
    image: temporalio/auto-setup:1.25.2
    container_name: argus-infra-temporal
    depends_on:
      temporal-postgresql:
        condition: service_healthy
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=temporal
      - POSTGRES_PWD=temporal
      - POSTGRES_SEEDS=temporal-postgresql
    ports:
      - "7233:7233"
    healthcheck:
      test: ["CMD", "tctl", "--address", "temporal:7233", "cluster", "health"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  # ------------------------------------------------------------------ Temporal UI
  temporal-ui:
    image: temporalio/ui:2.34.0
    container_name: argus-infra-temporal-ui
    depends_on:
      - temporal
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CORS_ORIGINS=http://localhost:3000
    ports:
      - "8233:8080"

  # -------------------------------------------------------------------- Keycloak
  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: argus-infra-keycloak
    command: ["start-dev", "--import-realm"]
    environment:
      # 26.x 부트스트랩 변수 + 구버전 호환 변수 동시 지정
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HTTP_PORT: "8080"
    ports:
      - "8180:8080"   # config 기본값 http://localhost:8180
    volumes:
      - keycloak-data:/opt/keycloak/data
      - ./config/keycloak:/opt/keycloak/data/import:ro
    healthcheck:
      # health 엔드포인트는 management 포트(9000)에서만 노출되므로 TCP 체크로 대체
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/8080"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 30s

  # --------------------------------------------------------- MariaDB (Sakila 샘플)
  # 품질 수집(quality/*.py)·메타데이터 동기화 데모용 원본 RDBMS.
  # deploy/download-sakila.sh 로 받은 스키마+데이터를 최초 기동 시 자동 적재.
  mariadb-sakila:
    image: mariadb:11.4
    container_name: argus-infra-mariadb-sakila
    ports:
      - "3306:3306"
    environment:
      MARIADB_ROOT_PASSWORD: sakila
      MARIADB_DATABASE: sakila
      MARIADB_USER: sakila
      MARIADB_PASSWORD: sakila
    volumes:
      - ./sakila:/docker-entrypoint-initdb.d:ro
      - mariadb-sakila-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 3s
      retries: 30

volumes:
  minio-data:
  temporal-pgdata:
  keycloak-data:
  mariadb-sakila-data:
