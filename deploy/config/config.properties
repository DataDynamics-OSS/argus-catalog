# 컨테이너 배포용 설정 변수. config.yml 의 ${var:default} 를 이 값으로 해석한다.
# (백엔드는 OS 환경변수를 읽지 않으므로 서비스 간 연결 정보는 여기서 주입한다.)

# 카탈로그 DB — compose 의 catalog-postgres 서비스
db.type=postgresql
db.host=catalog-postgres
db.port=5432
db.name=argus_catalog
db.username=argus
db.password=argus

# Object Storage — compose 의 minio 서비스
os.endpoint=http://minio:9000
os.access_key=minioadmin
os.secret_key=minioadmin
os.bucket=model-artifacts

# Temporal — compose 의 temporal 서비스
temporal.enabled=true
temporal.target=temporal:7233
temporal.namespace=default
temporal.task_queue=change-mgmt

# 컨테이너 내 경로
data.dir=/var/lib/argus-catalog-server
log.dir=/var/log/argus-catalog-server
